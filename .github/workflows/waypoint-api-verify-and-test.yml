name: "CI"

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]
  workflow_dispatch:

env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

permissions:
  contents: read
  pull-requests: write
  security-events: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Checkout → Build → Unit Tests → JaCoCo
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin
          cache: maven
          cache-dependency-path: waypoint-api/pom.xml

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install diff-cover
        run: pip install diff-cover

      - name: Build
        run: ./waypoint-api/mvnw compile -f waypoint-api/pom.xml

      - name: Unit Tests
        run: ./waypoint-api/mvnw test -f waypoint-api/pom.xml

      - name: JaCoCo Report
        run: ./waypoint-api/mvnw jacoco:report -f waypoint-api/pom.xml

      - name: Publish test results
        uses: dorny/test-reporter@v1
        if: success() || failure()
        with:
          name: Test Results
          path: waypoint-api/target/surefire-reports/*.xml
          reporter: java-junit
          fail-on-error: true

      - name: Extract failure summary
        if: failure() && github.event_name == 'pull_request'
        run: |
          python3 -c "
          import glob, xml.etree.ElementTree as ET, os
          failures = []
          report_dir = 'waypoint-api/target/surefire-reports'
          if os.path.isdir(report_dir):
              for f in glob.glob(report_dir + '/TEST-*.xml'):
                  tree = ET.parse(f)
                  root = tree.getroot()
                  for tc in root.iter('testcase'):
                      if tc.find('failure') is not None:
                          cls = tc.get('classname', '')
                          name = tc.get('name', '')
                          failures.append(f'{cls}.{name}')
          if failures:
              with open('failure-summary.txt', 'w') as out:
                  for f in failures:
                      out.write(f + '\n')
          "

      - name: Comment PR on test failure
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const { owner, repo } = context.repo;
            const runId = context.runId;
            const workflowUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${runId}`;
            let failures = [];
            try {
              const data = fs.readFileSync('failure-summary.txt', 'utf8');
              failures = data.trim().split('\n').filter(Boolean);
            } catch (e) {}
            let body = `## ❌ Tests failed\n\n`;
            if (failures.length > 0) {
              body += `**${failures.length} test(s) failed:**\n`;
              body += failures.map(f => `- \`${f}\``).join('\n');
              body += '\n\n';
            }
            body += `[View full workflow run](${workflowUrl})`;
            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: context.issue.number,
              body
            });

      - name: Print overall coverage
        run: |
          python3 -c "
          import xml.etree.ElementTree as ET
          tree = ET.parse('waypoint-api/target/site/jacoco/jacoco.xml')
          root = tree.getroot()
          for counter in root.iter('counter'):
              ctype = counter.get('type')
              covered = int(counter.get('covered'))
              missed = int(counter.get('missed'))
              total = covered + missed
              pct = covered / total * 100 if total else 0
              if ctype == 'INSTRUCTION':
                  print(f'Overall instruction coverage: {pct:.2f}%')
              elif ctype == 'BRANCH':
                  print(f'Overall branch coverage: {pct:.2f}%')
              elif ctype == 'LINE':
                  print(f'Overall line coverage: {pct:.2f}%')
              elif ctype == 'METHOD':
                  print(f'Overall method coverage: {pct:.2f}%')
          "

      - name: Check new code coverage
        if: github.event_name == 'pull_request'
        run: |
          diff-cover waypoint-api/target/site/jacoco/jacoco.xml \
            --compare-branch=origin/${{ github.base_ref }} \
            --fail-under=80

  static-analysis:
    name: SpotBugs → PMD → Checkstyle
    needs: test
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin
          cache: maven
          cache-dependency-path: waypoint-api/pom.xml

      - name: SpotBugs
        run: ./waypoint-api/mvnw spotbugs:check -f waypoint-api/pom.xml

      - name: PMD
        run: ./waypoint-api/mvnw pmd:check pmd:cpd-check -f waypoint-api/pom.xml

      - name: Checkstyle
        run: ./waypoint-api/mvnw checkstyle:check -f waypoint-api/pom.xml

      - name: Spotless
        run: ./waypoint-api/mvnw spotless:check -f waypoint-api/pom.xml

  security-scan:
    name: Semgrep → CodeQL → OWASP DC → Gitleaks
    needs: static-analysis
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin
          cache: maven
          cache-dependency-path: waypoint-api/pom.xml

      - name: Semgrep
        uses: semgrep/semgrep-action@v1
        with:
          config: p/default

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: java

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3

      - name: OWASP Dependency Check
        run: ./waypoint-api/mvnw dependency-check:check -f waypoint-api/pom.xml

      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-docker:
    name: Build Docker Image → Trivy
    needs: security-scan
    if: github.event_name != 'pull_request' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker API image
        run: docker build -t waypoint-api:ci ./waypoint-api

      - name: Build Docker Web image
        run: docker build -t waypoint-web:ci ./waypoint-web

      - name: Trivy Image Scan (API)
        uses: aquasecurity/trivy-action@v1
        with:
          image-ref: waypoint-api:ci
          format: sarif
          output: trivy-api.sarif
          severity: CRITICAL,HIGH

      - name: Trivy Image Scan (Web)
        uses: aquasecurity/trivy-action@v1
        with:
          image-ref: waypoint-web:ci
          format: sarif
          output: trivy-web.sarif
          severity: CRITICAL,HIGH

      - name: Upload Trivy results (API)
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-api.sarif

      - name: Upload Trivy results (Web)
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-web.sarif

  deploy:
    name: Deploy (production)
    needs: build-docker
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    runs-on: self-hosted
    environment: production
    steps:
      - uses: actions/checkout@v4
      - name: Deploy
        env:
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          SPRING_DATASOURCE_USERNAME: ${{ secrets.SPRING_DATASOURCE_USERNAME }}
          SPRING_DATASOURCE_PASSWORD: ${{ secrets.SPRING_DATASOURCE_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          MINIO_ROOT_USER: ${{ secrets.MINIO_ROOT_USER }}
          MINIO_ROOT_PASSWORD: ${{ secrets.MINIO_ROOT_PASSWORD }}
          APP_STORAGE_ACCESS_KEY: ${{ secrets.APP_STORAGE_ACCESS_KEY }}
          APP_STORAGE_SECRET_KEY: ${{ secrets.APP_STORAGE_SECRET_KEY }}
          APP_STORAGE_BUCKET: ${{ secrets.APP_STORAGE_BUCKET }}
          NEW_RELIC_LICENSE_KEY: ${{ secrets.NEW_RELIC_LICENSE_KEY }}
          NEW_RELIC_APP_NAME: ${{ secrets.NEW_RELIC_APP_NAME }}
          VITE_NEW_RELIC_ACCOUNT_ID: ${{ secrets.VITE_NEW_RELIC_ACCOUNT_ID }}
          VITE_NEW_RELIC_APP_ID: ${{ secrets.VITE_NEW_RELIC_APP_ID }}
          VITE_NEW_RELIC_LICENSE_KEY: ${{ secrets.VITE_NEW_RELIC_LICENSE_KEY }}
          DOZZLE_USERNAME: ${{ secrets.DOZZLE_USERNAME }}
          DOZZLE_PASSWORD: ${{ secrets.DOZZLE_PASSWORD }}
          TUNNEL_TOKEN: ${{ secrets.TUNNEL_TOKEN }}
          CORS_ALLOWED_ORIGINS: ${{ secrets.CORS_ALLOWED_ORIGINS }}
        run: ./scripts/deploy.sh

  deploy-dev:
    name: Deploy (development)
    needs: build-docker
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/develop'
    runs-on: self-hosted
    environment: development
    steps:
      - uses: actions/checkout@v4
      - name: Deploy
        env:
          COMPOSE_PROJECT_NAME: waypoint-dev
          WEB_PORT: "8881"
          DB_PORT: "5433"
          MINIO_PORT: "9002"
          MINIO_CONSOLE_PORT: "9003"
          DOZZLE_PORT: "8890"
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          SPRING_DATASOURCE_USERNAME: ${{ secrets.SPRING_DATASOURCE_USERNAME }}
          SPRING_DATASOURCE_PASSWORD: ${{ secrets.SPRING_DATASOURCE_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          MINIO_ROOT_USER: ${{ secrets.MINIO_ROOT_USER }}
          MINIO_ROOT_PASSWORD: ${{ secrets.MINIO_ROOT_PASSWORD }}
          APP_STORAGE_ACCESS_KEY: ${{ secrets.APP_STORAGE_ACCESS_KEY }}
          APP_STORAGE_SECRET_KEY: ${{ secrets.APP_STORAGE_SECRET_KEY }}
          APP_STORAGE_BUCKET: ${{ secrets.APP_STORAGE_BUCKET }}
          NEW_RELIC_LICENSE_KEY: ${{ secrets.NEW_RELIC_LICENSE_KEY }}
          NEW_RELIC_APP_NAME: ${{ secrets.NEW_RELIC_APP_NAME }}
          VITE_NEW_RELIC_ACCOUNT_ID: ${{ secrets.VITE_NEW_RELIC_ACCOUNT_ID }}
          VITE_NEW_RELIC_APP_ID: ${{ secrets.VITE_NEW_RELIC_APP_ID }}
          VITE_NEW_RELIC_LICENSE_KEY: ${{ secrets.VITE_NEW_RELIC_LICENSE_KEY }}
          DOZZLE_USERNAME: ${{ secrets.DOZZLE_USERNAME }}
          DOZZLE_PASSWORD: ${{ secrets.DOZZLE_PASSWORD }}
          TUNNEL_TOKEN: ${{ secrets.TUNNEL_TOKEN }}
          CORS_ALLOWED_ORIGINS: ${{ secrets.CORS_ALLOWED_ORIGINS }}
        run: ./scripts/deploy.sh
