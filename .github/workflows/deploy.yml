name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: self-hosted
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Deploy
        env:
          VAULT_CI_CD_TOKEN: ${{ secrets.VAULT_CI_CD_TOKEN }}
        run: ./scripts/deploy.sh
