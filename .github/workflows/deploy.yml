name: Deploy

on:
  workflow_call:
    inputs:
      environment:
        type: string
        required: true
        description: Deployment environment (production or development)
      build-api:
        type: boolean
        default: false
      build-web:
        type: boolean
        default: false
      restart-infra:
        type: boolean
        default: false

concurrency:
  group: deploy-${{ inputs.environment }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy (${{ inputs.environment }})
    runs-on: self-hosted
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v4

      - name: Deploy
        id: deploy
        env:
          COMPOSE_PROJECT_NAME: ${{ inputs.environment == 'development' && 'waypoint-dev' || '' }}
          WEB_PORT: ${{ inputs.environment == 'development' && '8881' || '' }}
          DB_PORT: ${{ inputs.environment == 'development' && '5433' || '' }}
          MINIO_PORT: ${{ inputs.environment == 'development' && '9002' || '' }}
          MINIO_CONSOLE_PORT: ${{ inputs.environment == 'development' && '9003' || '' }}
          DOZZLE_PORT: ${{ inputs.environment == 'development' && '8890' || '' }}
          BUILD_API: ${{ inputs.build-api && 'true' || 'false' }}
          BUILD_WEB: ${{ inputs.build-web && 'true' || 'false' }}
          RESTART_INFRA: ${{ inputs.restart-infra && 'true' || 'false' }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          SPRING_DATASOURCE_USERNAME: ${{ secrets.SPRING_DATASOURCE_USERNAME }}
          SPRING_DATASOURCE_PASSWORD: ${{ secrets.SPRING_DATASOURCE_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          MINIO_ROOT_USER: ${{ secrets.MINIO_ROOT_USER }}
          MINIO_ROOT_PASSWORD: ${{ secrets.MINIO_ROOT_PASSWORD }}
          APP_STORAGE_ACCESS_KEY: ${{ secrets.APP_STORAGE_ACCESS_KEY }}
          APP_STORAGE_SECRET_KEY: ${{ secrets.APP_STORAGE_SECRET_KEY }}
          APP_STORAGE_BUCKET: ${{ secrets.APP_STORAGE_BUCKET }}
          NEW_RELIC_LICENSE_KEY: ${{ secrets.NEW_RELIC_LICENSE_KEY }}
          NEW_RELIC_APP_NAME: ${{ secrets.NEW_RELIC_APP_NAME }}
          VITE_NEW_RELIC_ACCOUNT_ID: ${{ secrets.VITE_NEW_RELIC_ACCOUNT_ID }}
          VITE_NEW_RELIC_APP_ID: ${{ secrets.VITE_NEW_RELIC_APP_ID }}
          VITE_NEW_RELIC_LICENSE_KEY: ${{ secrets.VITE_NEW_RELIC_LICENSE_KEY }}
          DOZZLE_USERNAME: ${{ secrets.DOZZLE_USERNAME }}
          DOZZLE_PASSWORD: ${{ secrets.DOZZLE_PASSWORD }}
          TUNNEL_TOKEN: ${{ secrets.TUNNEL_TOKEN }}
          CORS_ALLOWED_ORIGINS: ${{ secrets.CORS_ALLOWED_ORIGINS }}
        run: ./scripts/deploy.sh

      - name: Send Discord notification
        if: always()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          STATUS: ${{ job.status }}
          ENVIRONMENT: ${{ inputs.environment }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ -z "$DISCORD_WEBHOOK" ]; then
            echo "DISCORD_WEBHOOK not set, skipping notification"
            exit 0
          fi
          if [ "$STATUS" = "success" ]; then
            ICON="✅"
          else
            ICON="❌"
          fi
          curl -s -H "Content-Type: application/json" \
            -d "{\"content\":\"${ICON} Deploy to **${ENVIRONMENT}** ${STATUS}\n${RUN_URL}\"}" \
            "$DISCORD_WEBHOOK"
