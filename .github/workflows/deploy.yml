name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: self-hosted
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Ensure Vault CLI
        run: |
          if command -v vault >/dev/null 2>&1; then
            echo "vault $(vault version) already installed"
          else
            echo "vault not found — installing static binary to \$HOME/.local/bin"
            VAULT_VERSION=$(curl -fsSL https://checkpoint-api.hashicorp.com/v1/check/vault \
              | python3 -c "import json,sys; print(json.load(sys.stdin)['current_version'])")
            ARCH=$(uname -m | sed 's/x86_64/amd64/; s/aarch64/arm64/; s/i386/386/')
            mkdir -p "$HOME/.local/bin"
            cd "$HOME/.local/bin"
            curl -fsSL "https://releases.hashicorp.com/vault/${VAULT_VERSION}/vault_${VAULT_VERSION}_linux_${ARCH}.zip" -o vault.zip
            if command -v unzip >/dev/null 2>&1; then
              unzip -o vault.zip vault
            else
              python3 -c "import zipfile; zipfile.ZipFile('vault.zip').extract('vault')"
            fi
            rm -f vault.zip
            chmod +x vault
            echo "$HOME/.local/bin" >> "$GITHUB_PATH"
            echo "installed: $(./vault version)"
          fi

      - name: Deploy
        env:
          VAULT_CI_CD_TOKEN: ${{ secrets.VAULT_CI_CD_TOKEN }}
        run: ./scripts/deploy.sh
