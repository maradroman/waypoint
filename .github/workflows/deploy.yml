name: "Deploy"

on:
  push:
    branches: [main]
    paths:
      - waypoint-api/**
      - waypoint-web/**
      - docker-compose.yml
  workflow_dispatch:

env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Build & Deploy
    runs-on: self-hosted
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Build images
        run: docker compose build

      - name: Deploy
        run: |
          docker compose down --remove-orphans
          docker compose up -d
