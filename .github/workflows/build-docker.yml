name: Build Docker & Trivy Scan

on:
  workflow_call:
    inputs:
      services_json:
        type: string
        required: true
        description: JSON array of services to build (e.g. '["api","web"]')

jobs:
  build:
    name: Build ${{ matrix.service }}
    runs-on: self-hosted
    strategy:
      matrix:
        service: ${{ fromJSON(inputs.services_json) }}
    env:
      SERVICE: ${{ matrix.service }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          SUCCESS=false
          for i in 1 2 3; do
            docker buildx build \
              --cache-from=type=gha,scope=waypoint-"$SERVICE" \
              --cache-to=type=gha,mode=max,scope=waypoint-"$SERVICE" \
              --load \
              -t waypoint-"$SERVICE":ci \
              ./waypoint-"$SERVICE" && { SUCCESS=true; break; }
            echo "Attempt $i failed, retrying in 10s..."
            sleep 10
          done
          if [ "$SUCCESS" != "true" ]; then
            echo "All 3 build attempts failed"
            exit 1
          fi

      - name: Trivy Image Scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: waypoint-${{ matrix.service }}:ci
          format: sarif
          output: trivy-${{ matrix.service }}.sarif
          severity: CRITICAL,HIGH

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-${{ matrix.service }}.sarif
          category: trivy-${{ matrix.service }}
