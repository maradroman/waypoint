services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: waypoint
      POSTGRES_USER: waypoint
      POSTGRES_PASSWORD: waypoint
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U waypoint"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./waypoint-api
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/waypoint
      SPRING_DATASOURCE_USERNAME: waypoint
      SPRING_DATASOURCE_PASSWORD: waypoint
      JWT_SECRET: ${JWT_SECRET:-waypoint-dev-secret-that-should-be-changed-in-production}
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: ./waypoint-web
    restart: unless-stopped
    ports:
      - "8880:8880"
    depends_on:
      - api

volumes:
  pgdata:
